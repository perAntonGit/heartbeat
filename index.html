<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Heartbeat · Partner Offer</title>

<style>
body{margin:0;font-family:Georgia,serif;background:#081f3f;color:white}

/* SECTION */
section{
  position:relative;
  min-height:100vh;
  background-size:cover;
  background-position:center 48%;
  display:flex;
  align-items:flex-end;
  padding:7vw;
  overflow:hidden;
}

/* WATER MOVEMENT */
section::before{
  content:"";
  position:absolute;
  inset:0;
  background:inherit;
  animation:waterMove 18s ease-in-out infinite alternate;
  z-index:0;
}

@keyframes waterMove{
  0%{transform:scale(1.02) translateY(0px)}
  100%{transform:scale(1.05) translateY(-20px)}
}

/* DARK OVERLAY */
section::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.1),rgba(0,0,0,.5));
  z-index:1;
}

/* TEXT CARD */
.card{
  position:relative;
  z-index:3;
  max-width:720px;
  background:rgba(8,31,63,.65);
  padding:40px;
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);
}

/* TEXT */
h2{font-size:48px;margin:0 0 15px}
p{font-size:20px;line-height:1.5;margin:0 0 10px}
.red{color:#ffb3bd}

/* FLAGS */
.flag{
  position:absolute;
  top:40px;
  width:80px;
  z-index:4;
  animation:flagWave 3s ease-in-out infinite;
}

.flag-left{left:30px}
.flag-right{right:30px}

@keyframes flagWave{
  0%{transform:rotate(0deg)}
  50%{transform:rotate(2deg)}
  100%{transform:rotate(0deg)}
}

/* TOP LABEL */
.logo{
  position:fixed;
  top:20px;
  left:20px;
  z-index:5;
  background:rgba(8,31,63,.7);
  padding:10px 14px;
  font-size:12px;
  letter-spacing:.2em;
}
</style>
</head>

<body>

<div class="logo">HEARTBEAT · LARVIK · NORWAY</div>

<section style="background-image:url('marina_night.jpg')">

  <!-- FLAGS -->
  <img src="kepler_flag.png" class="flag flag-left">
  <img src="kepler_flag.png" class="flag flag-right">

  <div class="card">
    <h2>Sailing</h2>
    <p>Wind becomes structure. Motion becomes balance.</p>
    <p>The rig loads, releases, and responds — continuously.</p>
    <p class="red">You don’t control the system. You work with it.</p>
  </div>

</section>

</body>
</html>
